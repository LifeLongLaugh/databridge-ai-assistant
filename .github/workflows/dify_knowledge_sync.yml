name: Dify Knowledge Base Sync

on:
  push:
    branches:
      - main
    paths:
      - 'Docs/**'

jobs:
  sync-to-dify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to detect deletions and modifications

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: Docs/**

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Dify Sync Script
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          DATASET_ID_MD: ${{ secrets.DIFY_DATASET_ID_MD }}
          DATASET_ID_TXT: ${{ secrets.DIFY_DATASET_ID_TXT }}
        run: |
          python sync to dify.py \
            "${{ steps.changed-files.outputs.added files }}" \
            "${{ steps.changed-files.outputs.modified files }}" \
            "${{ steps.changed-files.outputs.deleted files }}"
